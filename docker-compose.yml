networks:
  oldlegs:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: oldlegs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oldlegs
      POSTGRES_PASSWORD: oldlegs
      POSTGRES_DB: oldlegs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - oldlegs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oldlegs -d oldlegs"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: oldlegs_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - oldlegs
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: oldlegs_ollama_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - oldlegs
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "gemma4:31b-cloud"]

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: oldlegs_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://oldlegs:oldlegs@postgres:5432/oldlegs
      OLLAMA_BASE_URL: http://ollama:11434
      API_PORT: 8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - oldlegs

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: oldlegs_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - oldlegs
