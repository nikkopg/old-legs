<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Old Legs — Front Page · Prototype</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Abril+Fatface&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1612; min-height: 100%; }
  * { box-sizing: border-box; }
  body { font-family: "Work Sans", -apple-system, system-ui, sans-serif; color: #e6dfd0; }
  .stage { min-height: 100vh; padding: 40px 20px 80px; display:flex; justify-content:center; align-items:flex-start; }
  .back-bar {
    display:flex; justify-content:space-between; align-items:center;
    width: 980px; max-width: 100%; margin-bottom: 14px;
    font-family: "Work Sans", sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: #c8bfae;
  }
  .back-bar button {
    background: transparent; border: 1px solid #3a342c; color: #e6dfd0;
    padding: 8px 14px; font-family: inherit; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
  }
  .back-bar button:hover { background: #1f1b16; }
  .tweaks {
    position: fixed; bottom: 20px; right: 20px; z-index: 999;
    background: #121010; color: #f0ebe0; border: 1px solid #2a2620;
    padding: 14px 16px; font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px; min-width: 260px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
  }
  .tweaks.active { display: block; }
  .tweaks h3 { margin: 0 0 10px; font-size: 10px; letter-spacing: 3px; opacity: 0.7; text-transform: uppercase; font-weight: 500; }
  .tweaks .row { display: flex; flex-direction: column; gap: 6px; }
  .tweaks button {
    background: transparent; color: #f0ebe0; border: 1px solid #3a342c;
    padding: 8px 10px; text-align: left; cursor: pointer;
    font-family: inherit; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .tweaks button:hover { background: #1f1b16; }
  .tweaks button.on { background: #8a2a12; border-color: #8a2a12; color: #fff; }
  .tweaks .hint { font-size: 9px; letter-spacing: 1px; opacity: 0.5; margin-top: 8px; line-height: 1.5; }
</style>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "startAt": "dispatch"
  }/*EDITMODE-END*/;
  window.__TWEAKS = { ...TWEAK_DEFAULTS };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<div class="tweaks" id="tweaks">
  <h3>View</h3>
  <div class="row" id="tweaks-view"></div>
  <div class="hint">The Front Page is the Activities list. Tap any run to open its Dispatch (post-run broadsheet).</div>
</div>

<script type="text/babel" src="components/design-canvas.jsx"></script>
<script type="text/babel" src="components/run-data.jsx"></script>
<script type="text/babel" src="components/direction-news.jsx"></script>
<script type="text/babel" src="components/activity-feed.jsx"></script>
<script type="text/babel" src="components/activities-frontpage.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function initialState() {
  const t = window.__TWEAKS || {};
  try {
    const saved = localStorage.getItem('old-legs-proto');
    if (saved) {
      const p = JSON.parse(saved);
      return { route: p.route || (t.startAt === 'dispatch' ? 'dispatch' : 'frontpage'), openId: p.openId || 'r-000412' };
    }
  } catch {}
  return { route: t.startAt === 'dispatch' ? 'dispatch' : 'frontpage', openId: 'r-000412' };
}

function App() {
  const [state, setState] = useState(initialState);

  useEffect(() => {
    try { localStorage.setItem('old-legs-proto', JSON.stringify(state)); } catch {}
  }, [state]);

  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('active');
      if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('active');
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    const host = document.getElementById('tweaks-view');
    if (!host) return;
    host.innerHTML = '';
    [['frontpage','Front Page (list)'], ['dispatch','Dispatch (detail)']].forEach(([k, l]) => {
      const b = document.createElement('button');
      b.textContent = l;
      if (state.route === k) b.classList.add('on');
      b.onclick = () => {
        setState(s => ({ ...s, route: k }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { startAt: k } }, '*');
      };
      host.appendChild(b);
    });
  }, [state.route]);

  const openDispatch = (id) => setState(s => ({ ...s, route: 'dispatch', openId: id }));
  const backToFront = () => setState(s => ({ ...s, route: 'frontpage' }));

  return (
    <div className="stage" data-screen-label={state.route === 'frontpage' ? '01 Front Page' : '02 Dispatch'}>
      <div>
        <div className="back-bar">
          {state.route === 'dispatch' ? (
            <>
              <button onClick={backToFront}>← Back to Front Page</button>
              <span>Page 1A · Dispatch · {state.openId}</span>
            </>
          ) : (
            <>
              <span>Old Legs · Front Page · Vol. III No. 412</span>
              <span>Mon 13 Apr 2026 · Jakarta</span>
            </>
          )}
        </div>

        {state.route === 'frontpage' ? (
          <ActivitiesFrontPage onOpen={openDispatch}/>
        ) : (
          <NewsDirection pairingKey="tabloid"/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
